<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher | Lê Hoàng Lịch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #084db3;
            --accent: #e7f1ff;
            --text: #172033;
            --muted: #667085;
            --card: #ffffff;
            --border: #dbe7f7;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(13, 110, 253, 0.12), transparent 32%),
                linear-gradient(135deg, #ffffff 0%, #f4f9ff 100%);
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
        }

        .page-wrapper {
            max-width: 960px;
            margin: 36px auto;
            padding: 0 18px 32px;
        }

        .top-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 18px 45px rgba(13, 110, 253, 0.10);
        }

        .nav-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .brand-badge, .student-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--accent);
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 14px;
        }

        .home-link {
            color: var(--primary-dark);
            font-weight: 700;
            text-decoration: none;
        }

        .home-link:hover { text-decoration: none; color: var(--primary); }

        .hero {
            text-align: center;
            padding: 12px 8px 26px;
            border-bottom: 1px solid var(--border);
        }

        .hero h1 {
            margin: 0;
            color: var(--primary-dark);
            font-size: 34px;
            font-weight: 800;
            letter-spacing: 0.8px;
        }

        .hero p {
            margin: 10px auto 0;
            max-width: 620px;
            color: var(--muted);
            font-size: 15px;
        }

        .cipher-mark {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .cipher-panel {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 10px 26px rgba(15, 76, 129, 0.07);
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            color: var(--primary-dark);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .section-title span {
            background: var(--accent);
            border-radius: 12px;
            padding: 6px 10px;
            font-size: 12px;
            color: var(--primary);
        }

        label {
            color: var(--text);
            font-weight: 700;
            font-size: 14px;
        }

        .form-control {
            border: 1px solid #cbdff8;
            border-radius: 12px;
            min-height: 46px;
            color: var(--text);
            background: #fbfdff;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.18rem rgba(13, 110, 253, 0.14);
        }

        .btn {
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 700;
            border: none;
        }

        .btn-primary, .btn-success {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(13, 110, 253, 0.22);
        }

        .btn-primary:hover, .btn-success:hover {
            background: linear-gradient(135deg, #0b5ed7, #084db3);
            transform: translateY(-1px);
        }

        .hint-box {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #f0f7ff;
            color: var(--muted);
            font-size: 14px;
            border: 1px dashed #9ec5fe;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .nav-line { flex-direction: column; align-items: flex-start; }
            .hero h1 { font-size: 27px; }
        }
        
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="top-card">
            <div class="nav-line">
                <div class="brand-badge">BMTT HUTECH</div>
                <a class="home-link" href="/">← Về trang chính</a>
            </div>

            <div class="hero">
                <h1>CAESAR CIPHER</h1>
                <div class="student-badge mt-3">Lê Hoàng Lịch · 2380601206</div>
            </div>

            <div class="form-grid">
                <div class="cipher-panel">
                    <div class="section-title">Encryption <span>ENC</span></div>
                    <form method="POST" action="/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" placeholder="Input Plain Text" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" min="1" max="25" class="form-control" name="inputKeyPlain" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                </div>

                <div class="cipher-panel">
                    <div class="section-title">Decryption <span>DEC</span></div>
                    <form method="POST" action="/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" placeholder="Input Cipher Text" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="number" min="1" max="25" class="form-control" name="inputKeyCipher" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
