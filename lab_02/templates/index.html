<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Mã hóa cổ điển | Lê Hoàng Lịch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #084db3;
            --accent: #e7f1ff;
            --text: #172033;
            --muted: #667085;
            --border: #dbe7f7;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(13, 110, 253, 0.13), transparent 30%),
                radial-gradient(circle at bottom right, rgba(31, 142, 241, 0.10), transparent 28%),
                linear-gradient(135deg, #ffffff 0%, #f4f9ff 100%);
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
        }

        .main-wrapper {
            max-width: 1050px;
            margin: 36px auto;
            padding: 0 18px 30px;
        }

        .header-card {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 28px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(13, 110, 253, 0.10);
            position: relative;
            overflow: hidden;
        }

        .header-card::before {
            content: "0101  AES  SHIFT  KEY  MATRIX  1010";
            position: absolute;
            top: 14px;
            left: 0;
            width: 100%;
            color: rgba(13, 110, 253, 0.08);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 8px;
            white-space: nowrap;
        }

        .logo {
            width: 165px;
            max-width: 70%;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .eyebrow {
            position: relative;
            z-index: 1;
            display: inline-block;
            padding: 7px 14px;
            border-radius: 999px;
            background: var(--accent);
            color: var(--primary-dark);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.2px;
            margin-bottom: 14px;
        }

        .title {
            position: relative;
            z-index: 1;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .subtitle {
            position: relative;
            z-index: 1;
            color: var(--muted);
            margin-bottom: 0;
        }

        .student-row {
            position: relative;
            z-index: 1;
            margin-top: 18px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .student-info {
            display: inline-block;
            padding: 9px 16px;
            border-radius: 999px;
            background: #e8f1ff;
            color: var(--primary-dark);
            font-weight: 700;
            border: 1px solid #cfe2ff;
        }

        .cipher-grid { margin-top: 28px; }

        .cipher-card {
            height: 100%;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 10px 26px rgba(15, 76, 129, 0.329);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cipher-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 34px rgba(13, 110, 253, 0.14);
        }

        .cipher-icon {
            width: 46px;
            height: 46px;
            margin: 0 auto 14px;
            border-radius: 15px;
            background: var(--accent);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
        }

        .cipher-card h5 {
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
        }

        .cipher-card p {
            color: var(--muted);
            font-size: 14px;
            min-height: 44px;
        }

        .cipher-card a {
            display: inline-block;
            margin-top: 8px;
            padding: 10px 18px;
            border-radius: 12px;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(13, 110, 253, 0.22);
        }

        .cipher-card a:hover {
            background: linear-gradient(135deg, #0b5ed7, #084db3);
            color: #ffffff;
            text-decoration: none;
            transform: translateY(-1px);
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header-card">
            <img class="logo" src="https://file1.hutech.edu.vn/file/editor/homepage/stories/hinh34/logo%20CMYK-01.png" alt="Logo HUTECH">
            <h3 class="title">Bài thực hành Bảo mật thông tin nâng cao</h3>
            <div class="student-row">
                <div class="student-info">Sinh viên: Lê Hoàng Lịch</div>
                <div class="student-info">MSSV: 2380601206</div>
            </div>
        </div>

        <div class="row cipher-grid">
            <div class="col-md-6 col-lg-3 mb-4">
                <div class="cipher-card">
                    <div class="cipher-icon">C</div>
                    <h5>Caesar</h5>
                    <a href="/caesar">Mở chức năng</a>
                </div>
            </div>

            <div class="col-md-6 col-lg-3 mb-4">
                <div class="cipher-card">
                    <div class="cipher-icon">R</div>
                    <h5>Rail Fence</h5>
                    <a href="/railfence">Mở chức năng</a>
                </div>
            </div>

            <div class="col-md-6 col-lg-3 mb-4">
                <div class="cipher-card">
                    <div class="cipher-icon">P</div>
                    <h5>Playfair</h5>
                    <a href="/playfair">Mở chức năng</a>
                </div>
            </div>

            <div class="col-md-6 col-lg-3 mb-4">
                <div class="cipher-card">
                    <div class="cipher-icon">V</div>
                    <h5>Vigenere</h5>
                    <a href="/vigenere">Mở chức năng</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
